<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Plan Educourse - Ricardo Carranza</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --card:      #18181f;
      --border:    #2a2a35;
      --accent:    #e50914;
      --accent2:   #ff6b35;
      --gold:      #f5c518;
      --text:      #f0f0f5;
      --muted:     #888896;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .5;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, #0a0a0f 60%, transparent);
      padding: 18px 20px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: #fff;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--text), var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub {
      font-size: 11px; color: var(--muted); font-weight: 300;
      letter-spacing: 1px; margin-left: auto;
      text-transform: uppercase;
    }

    /* ─── HERO BANNER ─── */
    .hero {
      position: relative;
      padding: 32px 20px 28px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(229,9,20,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 11px; font-weight: 500; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .hero-label span { display: block; width: 24px; height: 2px; background: var(--accent); }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 10vw, 56px);
      line-height: 1; letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p {
      font-size: 14px; color: var(--muted); font-weight: 300;
      max-width: 320px; line-height: 1.6;
    }
    .hero-stats {
      display: flex; gap: 24px; margin-top: 20px;
    }
    .stat { text-align: center; }
    .stat-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: var(--gold); display: block;
    }
    .stat-l { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    /* ─── SECTION TITLE ─── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px;
      color: var(--muted);
      padding: 0 20px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ─── DAY GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 16px 32px;
    }

    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      animation: fadeUp .4s ease both;
    }
    .day-card:nth-child(1) { animation-delay: .05s; }
    .day-card:nth-child(2) { animation-delay: .10s; }
    .day-card:nth-child(3) { animation-delay: .15s; }
    .day-card:nth-child(4) { animation-delay: .20s; }
    .day-card:nth-child(5) { animation-delay: .25s; }
    .day-card:nth-child(6) { animation-delay: .30s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-card:active {
      transform: scale(.97);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(229,9,20,.25);
    }

    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      position: relative; overflow: hidden;
    }
    .card-thumb-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .card-thumb-bg svg {
      width: 40px; height: 40px;
      stroke-width: 1.25;
      filter: drop-shadow(0 0 18px currentColor);
      opacity: .9;
    }
    .card-thumb-bg.d1 { background: linear-gradient(135deg,#1a0a0a,#3d0a0a); color: #ff6b6b; }
    .card-thumb-bg.d2 { background: linear-gradient(135deg,#0a1a0a,#0a3d1a); color: #6bffa0; }
    .card-thumb-bg.d3 { background: linear-gradient(135deg,#0a0a1a,#0a1a3d); color: #6bb5ff; }
    .card-thumb-bg.d4 { background: linear-gradient(135deg,#1a1a0a,#3d2a0a); color: #ffd96b; }
    .card-thumb-bg.d5 { background: linear-gradient(135deg,#1a0a1a,#2a0a3d); color: #d96bff; }
    .card-day-num {
      position: absolute; top: 8px; left: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 2px;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      padding: 3px 8px; border-radius: 6px;
      color: var(--muted);
    }
    .card-count {
      position: absolute; top: 8px; right: 8px;
      font-size: 11px; font-weight: 600;
      background: var(--accent);
      color: #fff; padding: 2px 7px; border-radius: 6px;
    }

    .card-body { padding: 12px; }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-meta {
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .card-meta .dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; }
    .card-progress { margin-top: 10px; }
    .progress-bar {
      width: 100%; height: 3px;
      background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .6s ease;
    }

    /* ─── DETAIL PANEL ─── */
    .panel-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      display: none;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
    }
    .panel.open { transform: translateY(0); }
    .panel-handle {
      width: 40px; height: 4px;
      background: var(--border); border-radius: 99px;
      margin: 12px auto 0;
    }
    .panel-header {
      padding: 16px 20px 12px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .panel-day-tag {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); font-weight: 500; margin-bottom: 4px;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 1px;
    }
    .panel-desc {
      font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.5;
    }

    .questions-list { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 12px; }

    .q-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s;
    }
    .q-item:active { border-color: var(--accent); }

    .q-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
    }
    .q-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; color: var(--accent);
      flex-shrink: 0; min-width: 28px;
    }
    .q-info { flex: 1; min-width: 0; }
    .q-title { font-size: 14px; font-weight: 500; line-height: 1.3; }
    .q-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .q-play {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent);
      display: grid; place-items: center; flex-shrink: 0;
      color: #fff;
      transition: transform .15s, background .15s;
    }
    .q-play svg {
      width: 16px; height: 16px;
      stroke-width: 2.5;
      fill: #fff; stroke: #fff;
    }
    .q-item:active .q-play { transform: scale(.9); background: #b20710; }

    /* Video embed */
    .q-video {
      display: none;
      padding: 0 16px 16px;
    }
    .q-video.open { display: block; }
    .video-wrap {
      position: relative; width: 100%; aspect-ratio: 16/9;
      border-radius: 10px; overflow: hidden; background: #000;
    }
    .video-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: 0;
    }

    /* ─── BOTTOM NAV PLACEHOLDER ─── */
    .bottom-safe { height: 24px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">A</div>
  <span class="logo-text">Action Plan</span>
  <span class="logo-sub">Educourse</span>
</header>

<section class="hero">
  <div class="hero-label"><span></span>Ricardo Carranza</div>
  <h1>My English<br/><em>Video</em> Fluency Tasks</h1>
  <p>Select a day to watch the video about the fluency activities.</p>
  <div class="hero-stats">
    <div class="stat"><span class="stat-n" id="stat-days">5</span><span class="stat-l">Days</span></div>
    <div class="stat"><span class="stat-n" id="stat-videos">18</span><span class="stat-l">Videos</span></div>
    <div class="stat"><span class="stat-n" id="stat-done">0</span><span class="stat-l">Watched</span></div>
  </div>
</section>

<div class="section-title">Browse Activities</div>

<div class="grid" id="grid"></div>
<div class="bottom-safe"></div>

<!-- Detail panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div>
      <div class="panel-day-tag" id="p-tag"></div>
      <div class="panel-title" id="p-title"></div>
      <div class="panel-desc" id="p-desc"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="questions-list" id="q-list"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA — Edit this section with your own info
// ─────────────────────────────────────────────
const DAYS = [
  {
    title: "Videos",
    desc: "You are going to answer the following questions.",
    icon: "video",
    colorClass: "d1",
    questions: [
      { q: "How does your tone of voice impact communication?", note: "Video 1", ytSrc: "https://www.youtube.com/embed/GkCEhXeWHfI?si=6LMQVRth8EkoRyqF" },
      { q: "How does your tone of voice impact communication?", note: "Video 2", ytSrc: "https://www.youtube.com/embed/GsferDmp2As?si=fC1myuXzGIaUEt6S" },
      { q: "How does your tone of voice impact communication?", note: "Video 3", ytSrc: "https://www.youtube.com/embed/T332Vf3sy_Y?si=zZ7ywSeMWuiUOi-g" },
      { q: "How does your tone of voice impact communication?", note: "Video 4", ytSrc: "https://www.youtube.com/embed/M0vCzPlknao?si=WwuLHgcGgcaHyX4N" },
      { q: "How does your tone of voice impact communication?", note: "Video 5", ytSrc: "https://www.youtube.com/embed/oy8l93bS4n8?si=Wg1C36QUVKeuSVzd" },
      { q: "What advice would you give a person that wants to learn English?", note: "Video 1", ytSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
      { q: "What advice would you give a person that wants to learn English?", note: "Video 2", ytSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
      { q: "What advice would you give a person that wants to learn English?", note: "Video 3", ytSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
      { q: "What advice would you give a person that wants to learn English?", note: "Video 4", ytSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
      { q: "What advice would you give a person that wants to learn English?", note: "Video 5", ytSrc: "https://www.youtube.com/embed/dQw4w9WgXcQ" },
    ]
  },
  {
    title: "Mind Map",
    desc: "Organize your ideas visually with a mind map.",
    icon: "network",
    colorClass: "d2",
    questions: [
      { q: "Question 1", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 2", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 3", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 4", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
    ]
  },
  {
    title: "Make Up a Story",
    desc: "Create and tell an original story in English.",
    icon: "book-open",
    colorClass: "d3",
    questions: [
      { q: "Question 1", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 2", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 3", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
    ]
  },
  {
    title: "Thinking Sounds",
    desc: "Express your thoughts and reasoning out loud.",
    icon: "mic",
    colorClass: "d4",
    questions: [
      { q: "Question 1", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 2", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 3", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 4", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
    ]
  },
  {
    title: "Extend",
    desc: "Expand on previous activities and go further.",
    icon: "layers",
    colorClass: "d5",
    questions: [
      { q: "Question 1", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 2", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
      { q: "Question 3", note: "Activity note", ytSrc: "dQw4w9WgXcQ" },
    ]
  },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const watched = JSON.parse(localStorage.getItem('watched') || '{}');
let currentDay = null;
let openQ = null;

function totalVideos() { return DAYS.reduce((a,d)=>a+d.questions.length,0); }
function watchedCount() { return Object.keys(watched).length; }

// ─────────────────────────────────────────────
//  RENDER GRID
// ─────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  document.getElementById('stat-days').textContent = DAYS.length;
  document.getElementById('stat-videos').textContent = totalVideos();
  document.getElementById('stat-done').textContent = watchedCount();

  grid.innerHTML = DAYS.map((day, i) => {
    const total = day.questions.length;
    const done  = day.questions.filter((_,qi) => watched[`${i}-${qi}`]).length;
    const pct   = Math.round(done/total*100);
    return `
      <div class="day-card" onclick="openPanel(${i})">
        <div class="card-thumb">
          <div class="card-thumb-bg ${day.colorClass}"><i data-lucide="${day.icon}"></i></div>
          <span class="card-day-num">DAY ${i+1}</span>
          <span class="card-count">${total} videos</span>
        </div>
        <div class="card-body">
          <div class="card-title">${day.title}</div>
          <div class="card-meta">
            <span>${done}/${total} watched</span>
            ${done>0?`<span class="dot"></span><span>${pct}%</span>`:''}
          </div>
          <div class="card-progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  PANEL
// ─────────────────────────────────────────────
function openPanel(i) {
  currentDay = i;
  openQ = null;
  const day = DAYS[i];
  document.getElementById('p-tag').textContent = `Day ${i+1}`;
  document.getElementById('p-title').textContent = day.title;
  document.getElementById('p-desc').textContent = day.desc;

  document.getElementById('q-list').innerHTML = day.questions.map((q, qi) => {
    const key = `${i}-${qi}`;
    const seen = watched[key];
    return `
      <div class="q-item" id="q-${qi}" onclick="toggleQ(${qi})">
        <div class="q-header">
          <div class="q-num">${String(qi+1).padStart(2,'0')}</div>
          <div class="q-info">
            <div class="q-title">${q.q}</div>
            <div class="q-sub">${q.note}${seen ? ' · ✓ Watched' : ''}</div>
          </div>
          <div class="q-play"><i data-lucide="play"></i></div>
        </div>
        <div class="q-video" id="qv-${qi}">
          <div class="video-wrap">
            <iframe
              src="${q.ytSrc}"
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('overlay').style.display = 'block';
  setTimeout(()=>{ document.getElementById('panel').classList.add('open'); lucide.createIcons(); }, 10);
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  // destroy all iframes to stop audio immediately
  document.querySelectorAll('.q-video .video-wrap').forEach(wrap => {
    wrap.innerHTML = '';
  });
  document.getElementById('panel').classList.remove('open');
  setTimeout(()=>{
    document.getElementById('overlay').style.display = 'none';
    document.body.style.overflow = '';
    renderGrid();
    lucide.createIcons();
  }, 360);
}

function toggleQ(qi) {
  const vid = document.getElementById(`qv-${qi}`);
  const isOpen = vid.classList.contains('open');
  const day = DAYS[currentDay];

  // close all — destroy iframes to stop audio
  document.querySelectorAll('.q-video').forEach((v, idx) => {
    if (v.classList.contains('open')) {
      v.classList.remove('open');
      const wrap = v.querySelector('.video-wrap');
      if (wrap) wrap.innerHTML = '';
    }
  });

  if (!isOpen) {
    vid.classList.add('open');
    // restore iframe
    const wrap = vid.querySelector('.video-wrap');
    wrap.innerHTML = `<iframe
      src="${day.questions[qi].ytSrc}"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
      loading="lazy"
    ></iframe>`;
    openQ = qi;
    // mark as watched
    const key = `${currentDay}-${qi}`;
    watched[key] = true;
    localStorage.setItem('watched', JSON.stringify(watched));
    // update subtitle
    const sub = document.querySelector(`#q-${qi} .q-sub`);
    sub.textContent = day.questions[qi].note + ' · ✓ Watched';
  } else {
    openQ = null;
  }
}

// ─────────────────────────────────────────────
//  INIT — called from Lucide onload below
// ─────────────────────────────────────────────
</script>
<script>
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/lucide@0.447.0/dist/umd/lucide.min.js';
  s.onload = () => {
    renderGrid();
    lucide.createIcons();
  };
  document.body.appendChild(s);
</script>
</body>
</html>
